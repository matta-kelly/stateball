# Feature selection configuration.
# Run via: python -m xg.select xg/configs/select.toml

[data]
table = "main.feat_mlb__vectors"
max_games = 5000

[features]
mode = "auto"  # discover all warehouse columns

[sampling]
enabled = true
seed = 42

[split]
test_fraction = 0.20
calibrate_fraction = 0.25

[xgboost]
# Not used for final training — selection uses fast params internally.
# These are here for prepare_data() compatibility.
objective = "multi:softprob"
eval_metric = "mlogloss"
tree_method = "hist"
grow_policy = "lossguide"
max_depth = 0
max_leaves = 16
max_bin = 128
learning_rate = 0.15
n_estimators = 1000
min_child_weight = 100
subsample = 0.7
colsample_bytree = 0.7
reg_lambda = 10
reg_alpha = 1
max_delta_step = 1
random_state = 42
n_jobs = -1

[training]
early_stopping_rounds = 20

[output]
dir = "xg/experiments/selection"

[selection]
mrmr_n_select = 75
sage_n_select = 30       # generous — CV will find right cutoff from this pool
sage_n_eval = 8000
sage_background_n = 512
cv_n_folds = 5
cv_min_features = 10
target = "sim"

[project]
name = "simulator"
version = "0.1.0"
requires-python = ">=3.12,<3.14"
dependencies = [
    "xgboost>=2.1.0",
    "scikit-learn>=1.6.0",
    "joblib>=1.4.0",
    "pandas>=2.2.0",
    "numpy>=1.26.0",
    "pyyaml>=6.0",
    "s3fs>=2024.2.0",
    "onnxmltools>=1.12.0",
    "onnxruntime>=1.17.0",
    "duckdb>=1.2.0",
    "mrmr-selection>=0.2.8,<0.3.0",
    "sage-importance>=0.0.6",
    "scipy>=1.12.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "ruff>=0.4.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["sim", "xg"]

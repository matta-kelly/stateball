# ==============================================================================
# Dagster PostgreSQL Database (CloudNativePG)
# ==============================================================================
# Run storage, event log, schedule state for Dagster.
# ==============================================================================

apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: dagster-db
  namespace: stateball
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:16.2
  storage:
    size: 5Gi
    storageClass: local-path
  bootstrap:
    initdb:
      database: dagster
      owner: dagster
      secret:
        name: dagster-db-credentials

# ==============================================================================
# DuckLake PostgreSQL Catalog (CloudNativePG)
# ==============================================================================
# Metadata catalog for DuckLake — stores table definitions, schema metadata.
# DuckDB attaches to this via ducklake extension.
# ==============================================================================

apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: ducklake-db
  namespace: stateball
spec:
  instances: 1
  imageName: ghcr.io/cloudnative-pg/postgresql:16.2
  storage:
    size: 5Gi
    storageClass: local-path
  bootstrap:
    initdb:
      database: ducklake
      owner: ducklake

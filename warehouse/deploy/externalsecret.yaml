# ==============================================================================
# stateball Application Secrets (ExternalSecret -> upstream secret store)
# ==============================================================================
# Source items:
#   stateball-minio  -> MinIO S3 credentials
# ==============================================================================

apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: stateball-app-secrets
  namespace: stateball
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: app-secret-store
  target:
    name: stateball-app-secrets
    template:
      engineVersion: v2
      data:
        s3_access_key_id: '{{ index (.minio_raw | fromJson) "MINIO_ROOT_USER" }}'
        s3_secret_access_key: '{{ index (.minio_raw | fromJson) "MINIO_ROOT_PASSWORD" }}'
  data:
    - secretKey: minio_raw
      remoteRef:
        key: stateball-minio

---
# ==============================================================================
# MinIO credentials (ESO -> upstream secret store)
# ==============================================================================
# Used by the MinIO deployment and init job.
# ==============================================================================

apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: minio-credentials
  namespace: stateball
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: app-secret-store
  target:
    name: minio-credentials
    template:
      engineVersion: v2
      data:
        root_user: '{{ index (.minio_raw | fromJson) "MINIO_ROOT_USER" }}'
        root_password: '{{ index (.minio_raw | fromJson) "MINIO_ROOT_PASSWORD" }}'
  data:
    - secretKey: minio_raw
      remoteRef:
        key: stateball-minio

---
# ==============================================================================
# Dagster DB credentials (ESO -> upstream secret store)
# ==============================================================================
# CNPG uses this as the superuser password via bootstrap.initdb.secret.
# Dagster Helm chart expects 'postgresql-password' key for its webserver env.
# ==============================================================================

apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: dagster-db-credentials
  namespace: stateball
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: app-secret-store
  target:
    name: dagster-db-credentials
    template:
      engineVersion: v2
      type: kubernetes.io/basic-auth
      data:
        username: dagster
        password: "{{ .db_pass }}"
        postgresql-password: "{{ .db_pass }}"
  data:
    - secretKey: db_pass
      remoteRef:
        key: stateball-dagster-db

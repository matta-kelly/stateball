# ==============================================================================
# Liveball Auth Secret (ESO -> upstream secret store)
# ==============================================================================
# Source item: liveball-auth -> JWT signing secret
# ==============================================================================

apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: liveball-auth
  namespace: stateball
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: app-secret-store
  target:
    name: liveball-auth
  data:
    - secretKey: jwt_secret
      remoteRef:
        key: liveball-auth
